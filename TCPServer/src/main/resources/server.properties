# Server network configuration (loaded at runtime, no recompilation needed).
# An external server.properties placed next to the JAR overrides this file.

# Address the server socket binds to. 0.0.0.0 accepts connections on every
# network interface; use 127.0.0.1 to restrict to the local machine.
server.host=0.0.0.0

# TCP port clients connect to.
server.port=3000
